<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Приглашение на свадьбу</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="name">
                <div class="women">
                    <p class="pink">Настя</p>
                </div>
                <div class="men">

                </div>
                <div class="fon">
                    <img class="item1" src="images/Молодож.png" alt="">
                    <img class="item2" src="images/Сердечко.png" alt="">
                    <img class="item3" src="images/кольца.png" alt="">
                    <img class="item4" src="images/леденец.png" alt="">

            </div>

            </div>
            <div class="month">
                <p class="pink">Сентябрь</p>
                <img src="images/day.png">
